name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r server/requirements.txt pytest

      - name: Run tests
        run: |
          cd server
          NOVASCM_DB=/tmp/test_novascm.db NOVASCM_API_KEY=test-key python -m pytest tests/ -v --tb=short
        env:
          NOVASCM_API_KEY: test-key
          NOVASCM_DB: /tmp/test_novascm.db

  agent-tests:
    name: .NET Agent (xUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Run tests
        run: dotnet test NovaSCMAgent.Tests/NovaSCMAgent.Tests.csproj --verbosity normal

  # BUG: nessun job builda il client WPF principale o DeployScreen fuori da
  # un tag di release (release.yml gira solo su push di tag v*) — la maggior
  # parte dei bug corretti nel 2026-07 viveva proprio in MainWindow.xaml.cs/
  # App.xaml.cs/OsdWindow.xaml.cs, senza alcuna verifica automatica di build
  # tra un release e l'altro. Regressioni di sintassi/compilazione restavano
  # invisibili finché qualcuno non le trovava a mano.
  client-build:
    name: WPF Client Build (PolarisManager + DeployScreen)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build PolarisManager (client principale)
        run: dotnet build PolarisManager.csproj -c Release --nologo

      - name: Build DeployScreen
        run: dotnet build DeployScreen/NovaSCMDeployScreen.csproj -c Release --nologo
