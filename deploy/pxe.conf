# ProxyDHCP — iVentoy @ 192.168.10.122
# Risponde solo ai broadcast PXE (non assegna IP — ci pensa UCG Fiber)
dhcp-range=192.168.10.0,proxy

# I-1: rimossa riga BIOS (pxelinux non presente su iVentoy; tutti i PC target sono UEFI)
# Indica al client UEFI: scarica snponly.efi dal TFTP di iVentoy
pxe-service=X86-64_EFI,"Network Boot (UEFI)",snponly.efi,192.168.10.122
pxe-service=BC_EFI,"Network Boot (UEFI BC)",snponly.efi,192.168.10.122
