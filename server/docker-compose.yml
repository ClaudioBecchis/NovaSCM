services:
  novascm-api:
    build: .
    container_name: novascm-api
    ports:
      - "9091:9091"
      # Uncomment the line below to enable PXE/TFTP boot (requires ipxe.efi in ./dist/)
      # - "69:69/udp"
    volumes:
      - novascm-data:/data
      # Uncomment to mount your ipxe.efi for PXE support:
      # - ./dist:/app/dist:ro
    environment:
      NOVASCM_DB: /data/novascm.db
      PORT: 9091
      NOVASCM_API_KEY: ${NOVASCM_API_KEY:-}
      NOVASCM_PUBLIC_URL: ${NOVASCM_PUBLIC_URL:-}
      # Set to 1 to enable PXE/TFTP server (also uncomment port 69 above)
      NOVASCM_PXE_ENABLED: ${NOVASCM_PXE_ENABLED:-0}
      NOVASCM_RATE_LIMIT_STORAGE: memory://
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.50'
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9091/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  novascm-data:
    driver: local
